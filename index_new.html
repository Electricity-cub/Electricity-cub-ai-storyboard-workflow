<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI分镜师 - 智能分镜生成系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 1em;
        }

        textarea, input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
            display: none;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #result {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            display: none;
        }

        #result.success {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        #result.error {
            background: #ffebee;
            border-left-color: #f44336;
        }

        .result-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .result-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #555;
            line-height: 1.6;
            font-size: 0.95em;
            max-height: 500px;
            overflow-y: auto;
        }

        .icon {
            font-size: 1.2em;
            margin-right: 8px;
        }

        .token-warning {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            color: #0d47a1;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .setup-steps {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .setup-steps h3 {
            color: #e65100;
            margin-bottom: 10px;
        }

        .setup-steps ol {
            margin-left: 20px;
            color: #555;
        }

        .setup-steps li {
            margin-bottom: 8px;
        }

        .setup-steps code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 AI分镜师</h1>
        <p class="subtitle">智能分镜生成系统 - 将剧本转化为专业分镜脚本</p>

        <div class="setup-steps">
            <h3>📋 使用步骤</h3>
            <ol>
                <li>打开终端，进入项目目录</li>
                <li>运行：<code>cd backend &amp;&amp; ./start.sh</code></li>
                <li>等待服务启动完成（看到"启动后端服务..."）</li>
                <li>在下方输入剧本内容，点击"生成分镜"</li>
            </ol>
        </div>

        <div class="form-group">
            <label for="scriptContent">
                <span class="icon">📝</span>剧本内容
            </label>
            <textarea id="scriptContent" placeholder="请输入剧本内容，例如：小明和小红在公园相遇，一见钟情。他们开始聊天，发现彼此有很多共同点。">
小明和小红在公园相遇，一见钟情。他们开始聊天，发现彼此有很多共同点。</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="episodeNumber">
                    <span class="icon">🎞️</span>集数
                </label>
                <input type="text" id="episodeNumber" value="ep01" placeholder="例如：ep01">
            </div>

            <div class="form-group">
                <label for="visualStyle">
                    <span class="icon">🎨</span>视觉风格
                </label>
                <select id="visualStyle">
                    <option value="写实">写实</option>
                    <option value="3D CG">3D CG</option>
                    <option value="国漫">国漫</option>
                    <option value="日漫">日漫</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="projectType">
                <span class="icon">🎯</span>项目类型
            </label>
            <select id="projectType">
                <option value="国内短剧">国内短剧</option>
                <option value="海外短剧">海外短剧</option>
                <option value="国内动漫剧">国内动漫剧</option>
                <option value="海外动漫剧">海外动漫剧</option>
            </select>
        </div>

        <button onclick="generateStoryboard()" id="generateBtn">
            <span class="icon">✨</span>生成分镜
        </button>

        <div class="loading" id="loading">
            ⏳ 正在生成分镜，请稍候...
        </div>

        <div id="result">
            <div class="result-title">分镜结果</div>
            <div class="result-content" id="resultContent"></div>
        </div>
    </div>

    <script>
        // 配置后端API地址
        const BACKEND_API_URL = "http://localhost:5000/api/v1/generate";

        async function generateStoryboard() {
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');

            const data = {
                script_content: document.getElementById('scriptContent').value.trim(),
                episode_number: document.getElementById('episodeNumber').value.trim(),
                visual_style: document.getElementById('visualStyle').value,
                project_type: document.getElementById('projectType').value
            };

            // 验证输入
            if (!data.script_content) {
                alert('请输入剧本内容');
                return;
            }

            // 显示加载状态
            btn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                // 调用后端API
                const response = await fetch(BACKEND_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        input: data
                    })
                });

                const responseData = await response.json();

                // 隐藏加载状态
                loading.style.display = 'none';
                btn.disabled = false;

                if (response.ok && responseData) {
                    result.className = 'result success';
                    result.style.display = 'block';

                    // 格式化显示结果
                    let formattedResult = '';
                    if (typeof responseData === 'object') {
                        formattedResult = JSON.stringify(responseData, null, 2);
                    } else {
                        formattedResult = String(responseData);
                    }

                    resultContent.textContent = formattedResult;
                } else {
                    result.className = 'result error';
                    result.style.display = 'block';
                    resultContent.textContent = '错误：' + (responseData?.error || '未知错误');

                    // 如果是Token未配置的错误，给出提示
                    if (responseData?.error && responseData.error.includes('API Token未配置')) {
                        alert('后端API Token未配置！\n\n请打开 backend/app.py 文件，找到第22行，将"你的Coze_API_Token"替换成你实际的Coze API Token。\n\n然后重启后端服务。');
                    }
                }

            } catch (error) {
                loading.style.display = 'none';
                btn.disabled = false;
                result.className = 'result error';
                result.style.display = 'block';
                resultContent.textContent = '调用失败：' + error.message;

                // 如果是连接失败，提示启动后端服务
                if (error.message.includes('Failed to fetch')) {
                    resultContent.textContent = '连接失败：无法连接到后端服务\n\n请确保后端服务已启动：\n1. 打开终端\n2. cd backend\n3. ./start.sh\n4. 等待服务启动完成';
                }
            }
        }
    </script>
</body>
</html>
